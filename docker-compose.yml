version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiwi
      POSTGRES_PASSWORD: kiwipassword
      POSTGRES_DB: kiwi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiwi -d kiwi"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"] # Enable JetStream and Monitoring port
    ports:
      - "4222:4222"
      - "8222:8222" # Management port
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: kiwipassword
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 5

  kiwi-api:
    build: .
    restart: on-failure
    command: ["-role", "api", "-dsn", "host=postgres user=kiwi password=kiwipassword dbname=kiwi port=5432 sslmode=disable", "-nats", "nats://nats:4222"]
    environment:
      - KIWI_SERVER_TOKEN=development-token
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - sandbox_data:/tmp

  kiwi-llmo:
    build: .
    restart: on-failure
    command: ["-role", "orchestrator", "-dsn", "host=postgres user=kiwi password=kiwipassword dbname=kiwi port=5432 sslmode=disable", "-nats", "nats://nats:4222"]
    environment:
      - KIWI_LLM_PROVIDER=${KIWI_LLM_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - sandbox_data:/tmp

volumes:
  postgres_data:
  nats_data:
  minio_data:
  sandbox_data:
