name: Frontend CI

# Frontend (Next.js) CI. Path-filtered so it only runs when frontend/ changes;
# the Go backend has its own workflow (ci.yml).
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `next build` is also the type-check gate. There is no `test` script yet;
      # add `npm test` here once the frontend has tests (see TODO_UI.md).
      - name: Build
        run: npm run build
