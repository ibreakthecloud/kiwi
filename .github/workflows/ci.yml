name: Continuous Integration

# Backend (Go) CI. Path-filtered so it does not run on frontend-only changes;
# the frontend has its own workflow (frontend-ci.yml).
on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'migrations/**'
      - '.github/workflows/ci.yml'
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'migrations/**'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run Go Vet
        run: go vet ./...

      - name: Check Go Format
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly. Please run 'go fmt ./...':"
            gofmt -l .
            exit 1
          fi

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run Tests
        run: CGO_ENABLED=0 go test -v ./pkg/...

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Build Kiwi Client
        run: go build -v -o kiwi ./cmd/kiwi

      - name: Build Control Plane Daemon
        run: go build -v -o kiwid ./cmd/kiwid

      - name: Build BYOC Data Plane Daemon
        run: go build -v -o kiwidaemon ./cmd/kiwidaemon
