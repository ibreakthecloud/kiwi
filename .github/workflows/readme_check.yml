name: Enforce README Updates

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for README modifications
        id: check_readme
        run: |
          # Fetch the base branch to compare against
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}
          
          if git diff --name-only origin/${{ github.base_ref }} HEAD | grep -q "^README\.md$"; then
            echo "README.md has been modified."
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "README.md has not been modified."
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify conditions
        if: steps.check_readme.outputs.modified == 'false' && !contains(github.event.pull_request.labels.*.name, 'skip-readme-check')
        run: |
          echo "::error::README.md was not updated in this PR. Please update the README to reflect your changes, or add the 'skip-readme-check' label if an update is not necessary."
          exit 1
