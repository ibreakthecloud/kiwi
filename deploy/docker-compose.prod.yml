version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiwi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiwipassword}
      POSTGRES_DB: ${POSTGRES_DB:-kiwi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiwi"]
      interval: 5s
      timeout: 5s
      retries: 5

  kiwid:
    build:
      context: ..
      dockerfile: Dockerfile
    # ENTRYPOINT is ./kiwid; no command override needed.
    environment:
      - KIWI_ENV=production
      - KIWI_DSN=postgres://${POSTGRES_USER:-kiwi}:${POSTGRES_PASSWORD:-kiwipassword}@postgres:5432/${POSTGRES_DB:-kiwi}?sslmode=disable
      - KIWI_ENCRYPTION_KEY=${KIWI_ENCRYPTION_KEY}
      - KIWI_SERVER_TOKEN=${KIWI_SERVER_TOKEN}
      - KIWI_CORS_ALLOWED_ORIGINS=${KIWI_CORS_ALLOWED_ORIGINS}
      - KIWI_ADDR=:8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - kiwid

  kiwidaemon:
    build:
      context: ..
      dockerfile: Dockerfile
    # Override the entrypoint (the image ENTRYPOINT is ./kiwid). Using `command`
    # alone would append args to ./kiwid and boot a second control plane.
    #
    # The daemon runs each task's sandbox via the host Docker daemon (mounted
    # socket). For those `docker run -v <worktree>:/workspace` bind-mounts to
    # resolve, the worktree path must be identical on the host and inside this
    # container — so the state dir (key + git cache) is bind-mounted at the SAME
    # absolute path on both sides. A named volume would leave the sandbox mount
    # pointing at a host path that does not exist, silently mounting nothing.
    # It also persists the daemon's identity across restarts (join tokens are
    # single-use, so re-registering would fail).
    entrypoint: ["./kiwidaemon"]
    command:
      - "-api-url"
      - "http://kiwid:8080"
      - "-key-path"
      - "${KIWI_DAEMON_STATE:-/var/lib/kiwi-daemon}/daemon.key"
      - "-cache-dir"
      - "${KIWI_DAEMON_STATE:-/var/lib/kiwi-daemon}/cache"
    environment:
      - KIWI_JOIN_TOKEN=${KIWI_JOIN_TOKEN}
    volumes:
      - ${KIWI_DAEMON_STATE:-/var/lib/kiwi-daemon}:${KIWI_DAEMON_STATE:-/var/lib/kiwi-daemon}
      - /var/run/docker.sock:/var/run/docker.sock # required for running sandboxes
    depends_on:
      - kiwid
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
